<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service | Google Services Store</title>
  <meta name="description" content="Separate Google-style shopping service with catalog, cart, checkout, and payment flow.">
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/1200px-Google_%22G%22_logo.svg.png">

  <style>
* {
  box-sizing: border-box;
}

:root {
  --blue: #2874f0;
  --ink: #172337;
  --muted: #64748b;
  --line: #e5e7eb;
  --surface: #ffffff;
  --soft: #f1f5f9;
  --green: #16a34a;
  --red: #dc2626;
  --shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
  font-family: "Google Sans", Arial, sans-serif;
}

body {
  margin: 0;
  color: var(--ink);
  background: #f5f7fb;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
}

.topbar-inner {
  width: min(1240px, calc(100% - 28px));
  min-height: 72px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: max-content;
  font-weight: 800;
}

.brand-mark {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, var(--blue), #6aa8ff);
  color: #fff;
  font-weight: 800;
}

.search {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 180px;
  height: 44px;
  padding: 0 14px;
  border-radius: 4px;
  background: #eef3ff;
}

.search input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.home-link,
.cart-button {
  border: 1px solid var(--line);
  background: #fff;
  min-height: 42px;
  padding: 0 14px;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
}

.cart-count {
  min-width: 22px;
  height: 22px;
  border-radius: 999px;
  display: inline-grid;
  place-items: center;
  background: var(--blue);
  color: #fff;
  font-size: 12px;
}

.hero {
  background: linear-gradient(135deg, #ffffff 0%, #eaf2ff 100%);
  border-bottom: 1px solid var(--line);
}

.hero-inner {
  width: min(1240px, calc(100% - 28px));
  margin: 0 auto;
  padding: 36px 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 430px);
  gap: 28px;
  align-items: center;
}

.eyebrow {
  color: var(--blue);
  font-weight: 800;
  margin: 0 0 10px;
}

h1 {
  margin: 0;
  font-size: clamp(34px, 6vw, 62px);
  letter-spacing: -0.04em;
  line-height: 0.98;
}

.lead {
  max-width: 62ch;
  margin: 16px 0 22px;
  color: #334155;
  font-size: 18px;
  line-height: 1.65;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.btn {
  border: 0;
  min-height: 44px;
  padding: 0 16px;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 800;
}

.btn.primary {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 10px 22px rgba(40, 116, 240, 0.22);
}

.btn.ghost {
  background: #fff;
  color: var(--ink);
  border: 1px solid var(--line);
}

.hero-card {
  min-height: 280px;
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow);
  padding: 22px;
  display: grid;
  place-items: center;
}

.hero-card img {
  width: min(100%, 360px);
  height: 230px;
  object-fit: contain;
  filter: drop-shadow(0 18px 26px rgba(15, 23, 42, 0.16));
}

.catalog-shell {
  width: min(1240px, calc(100% - 28px));
  margin: 24px auto 46px;
}

.controls {
  margin-bottom: 18px;
  padding: 14px;
  border-radius: 8px;
  background: #fff;
  border: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.controls select {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  padding: 0 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}

.product-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100%;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.thumb {
  height: 210px;
  display: grid;
  place-items: center;
  background: linear-gradient(180deg, #f8fbff, #fff);
  padding: 14px;
}

.thumb img {
  max-width: 100%;
  max-height: 178px;
  object-fit: contain;
}

.product-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.product-title {
  margin: 0;
  font-size: 17px;
}

.product-desc {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
  flex: 1;
}

.product-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

.price {
  font-weight: 900;
  color: #111827;
}

.rating {
  color: var(--green);
  font-weight: 800;
  font-size: 13px;
}

.empty {
  grid-column: 1 / -1;
  padding: 36px;
  text-align: center;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--muted);
}

.drawer {
  position: fixed;
  inset: 0 0 0 auto;
  width: min(420px, 100vw);
  z-index: 50;
  background: #fff;
  box-shadow: -20px 0 44px rgba(15, 23, 42, 0.2);
  transform: translateX(110%);
  transition: transform 0.22s ease;
  display: flex;
  flex-direction: column;
}

.drawer.open {
  transform: translateX(0);
}

.drawer-header,
.drawer-footer {
  padding: 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.drawer-footer {
  border-top: 1px solid var(--line);
  border-bottom: 0;
  flex-direction: column;
  align-items: stretch;
}

.cart-list {
  padding: 12px 16px;
  overflow: auto;
  flex: 1;
}

.cart-item {
  display: grid;
  grid-template-columns: 74px minmax(0, 1fr);
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}

.cart-item img {
  width: 74px;
  height: 74px;
  object-fit: contain;
  border-radius: 6px;
  background: var(--soft);
}

.qty-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.qty-row button {
  width: 28px;
  height: 28px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 4px;
  cursor: pointer;
}

.total-row {
  display: flex;
  justify-content: space-between;
  font-size: 19px;
  font-weight: 900;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(15, 23, 42, 0.58);
}

.modal.open {
  display: grid;
}

.checkout-card {
  width: min(560px, 100%);
  max-height: calc(100vh - 36px);
  overflow: auto;
  background: #fff;
  border-radius: 8px;
  padding: 20px;
}

.checkout-card h2 {
  margin: 0 0 14px;
}

.field-grid {
  display: grid;
  gap: 10px;
}

.field-grid input,
.field-grid textarea,
.field-grid select {
  width: 100%;
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 9px 10px;
}

.field-grid textarea {
  resize: vertical;
  min-height: 82px;
}

.payment-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 14px 0;
}

.notice {
  margin-top: 12px;
  padding: 12px;
  border-radius: 6px;
  background: #f0fdf4;
  color: #166534;
  display: none;
}

.notice.error {
  background: #fef2f2;
  color: var(--red);
}

@media (max-width: 980px) {
  .hero-inner {
    grid-template-columns: 1fr;
  }

  .grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 620px) {
  .topbar-inner {
    flex-wrap: wrap;
    padding: 12px 0;
  }

  .search {
    order: 3;
    flex-basis: 100%;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

      </label>
      <div class="header-actions">
        <a class="home-link" href="../index.html">Home</a>
        <button class="cart-button" id="cartButton">Cart <span class="cart-count" id="cartCount">0</span></button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <div>
          <p class="eyebrow" id="serviceEyebrow">Service</p>
          <h1 id="serviceTitle">Service</h1>
          <p class="lead" id="serviceIntro">Explore products, add to cart, and checkout.</p>
          <div class="hero-actions">
            <button class="btn primary" id="browseButton">Browse products</button>
            <button class="btn ghost" id="cartButtonHero" onclick="document.getElementById('cartButton').click()">Open cart</button>
          </div>
        </div>
        <div class="hero-card">
          <img id="heroImage" src="" alt="Service products" loading="eager">
        </div>
      </div>
    </section>

    <section class="catalog-shell" id="catalog">
      <div class="controls">
        <strong>Featured products</strong>
        <label>
          Sort
          <select id="sortSelect">
            <option value="featured">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top rated</option>
          </select>
        </label>
      </div>
      <div class="grid" id="productGrid"></div>
    </section>
  </main>

  <aside class="drawer" id="cartDrawer" aria-label="Shopping cart">
    <div class="drawer-header">
      <strong>Your Cart</strong>
      <button class="btn ghost" id="closeCart">Close</button>
    </div>
    <div class="cart-list" id="cartList"></div>
    <div class="drawer-footer">
      <div class="total-row">
        <span>Total</span>
        <span id="cartTotal">Rs. 0</span>
      </div>
      <button class="btn primary" id="checkoutButton">Checkout</button>
    </div>
  </aside>

  <div class="modal" id="checkoutModal">
    <div class="checkout-card">
      <div class="drawer-header" style="padding:0 0 14px;border-bottom:0;">
        <h2>Checkout</h2>
        <button class="btn ghost" id="closeCheckout">Close</button>
      </div>
      <form id="checkoutForm" class="field-grid">
        <input id="customerName" name="name" type="text" placeholder="Full name" required>
        <input id="customerEmail" name="email" type="email" placeholder="Email" required>
        <input name="phone" type="tel" placeholder="Mobile number" required>
        <textarea name="address" placeholder="Shipping address" required></textarea>
        <select name="payment">
          <option>UPI</option>
          <option>Card</option>
          <option>Net Banking</option>
          <option>Cash on Delivery</option>
        </select>
        <button class="btn primary" type="submit">Place order</button>
      </form>
      <div class="notice" id="notice"></div>
    </div>
  </div>

const categoryKey = document.body.dataset.category || "fashion";
const service = catalogs[categoryKey] || catalogs.fashion;
let products = service.products.map((item, index) => ({
  id: item[0],
  name: item[1],
  price: item[2],
  desc: item[3],
  image: `https://loremflickr.com/520/380/${encodeURIComponent(item[4])}?lock=${stableLock(`${categoryKey}-${index}-${item[1]}`)}`,
  rating: (4 + ((index % 5) * 0.15)).toFixed(1)
}));
let filteredProducts = products.slice();
let cart = readLocalCart();

const searchInput = document.getElementById("searchInput");
const sortSelect = document.getElementById("sortSelect");
const grid = document.getElementById("productGrid");
const cartDrawer = document.getElementById("cartDrawer");
const cartList = document.getElementById("cartList");
const cartCount = document.getElementById("cartCount");
const cartTotal = document.getElementById("cartTotal");
const checkoutModal = document.getElementById("checkoutModal");
const checkoutForm = document.getElementById("checkoutForm");
const notice = document.getElementById("notice");

function stableLock(value) {
  return Array.from(String(value)).reduce((hash, char) => (hash * 33 + char.charCodeAt(0)) % 100000, 11) + 1;
}

function formatPrice(value) {
  return "Rs. " + Number(value || 0).toLocaleString("en-IN");
}

function readCurrentUser() {
  try {
    const parsed = JSON.parse(localStorage.getItem(USER_KEY) || "null");
    return parsed && parsed.email ? parsed : null;
  } catch {
    return null;
  }
}

function readLocalCart() {
  try {
    return JSON.parse(localStorage.getItem(`serviceCart:${categoryKey}`) || "{}");
  } catch {
    return {};
  }
}

function saveLocalCart() {
  localStorage.setItem(`serviceCart:${categoryKey}`, JSON.stringify(cart));
}

async function apiRequest(path, options = {}) {
  const response = await fetch(`${API_BASE}${path}`, {
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
    ...options
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.error || "Request failed");
  return data;
}

function getCartRows() {
  return Object.entries(cart)
    .map(([id, quantity]) => {
      const product = products.find((item) => item.id === id);
      return product ? { ...product, quantity, subtotal: product.price * quantity } : null;
    })
    .filter(Boolean);
}

function setTheme() {
  document.documentElement.style.setProperty("--blue", service.accent);
  document.title = `${service.title} | Google Services Store`;
  document.getElementById("serviceTitle").textContent = service.title;
  document.getElementById("serviceEyebrow").textContent = service.eyebrow;
  document.getElementById("serviceIntro").textContent = service.intro;
  document.getElementById("brandText").textContent = service.title;
  document.getElementById("heroImage").src = service.hero;
}

function renderProducts() {
  grid.innerHTML = "";
  if (!filteredProducts.length) {
    grid.innerHTML = `<div class="empty">No products found. Try another search.</div>`;
    return;
  }

  filteredProducts.forEach((product) => {
    const card = document.createElement("article");
    card.className = "product-card";
    card.innerHTML = `
      <div class="thumb"><img src="${product.image}" alt="${product.name}" loading="lazy"></div>
      <div class="product-body">
        <h3 class="product-title">${product.name}</h3>
        <p class="product-desc">${product.desc}</p>
        <div class="product-meta">
          <span class="price">${formatPrice(product.price)}</span>
          <span class="rating">${product.rating} rating</span>
        </div>
        <button class="btn primary" data-add="${product.id}">Add to cart</button>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll("[data-add]").forEach((button) => {
    button.addEventListener("click", () => addToCart(button.dataset.add));
  });
}

function renderCart() {
  const rows = getCartRows();
  const total = rows.reduce((sum, row) => sum + row.subtotal, 0);
  const count = rows.reduce((sum, row) => sum + row.quantity, 0);
  cartCount.textContent = String(count);
  cartTotal.textContent = formatPrice(total);
  cartList.innerHTML = rows.length ? "" : `<p class="empty">Your cart is empty.</p>`;

  rows.forEach((row) => {
    const item = document.createElement("div");
    item.className = "cart-item";
    item.innerHTML = `
      <img src="${row.image}" alt="${row.name}">
      <div>
        <strong>${row.name}</strong>
        <div class="price">${formatPrice(row.subtotal)}</div>
        <div class="qty-row">
          <button data-dec="${row.id}">-</button>
          <span>${row.quantity}</span>
          <button data-inc="${row.id}">+</button>
          <button data-remove="${row.id}">Remove</button>
        </div>
      </div>
    `;
    cartList.appendChild(item);
  });

  cartList.querySelectorAll("[data-inc]").forEach((button) => button.addEventListener("click", () => addToCart(button.dataset.inc)));
  cartList.querySelectorAll("[data-dec]").forEach((button) => button.addEventListener("click", () => changeQty(button.dataset.dec, -1)));
  cartList.querySelectorAll("[data-remove]").forEach((button) => button.addEventListener("click", () => removeFromCart(button.dataset.remove)));
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  saveLocalCart();
  renderCart();
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  saveLocalCart();
  renderCart();
}

function removeFromCart(id) {
  delete cart[id];
  saveLocalCart();
  renderCart();
}

function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  filteredProducts = products.filter((product) => `${product.name} ${product.desc}`.toLowerCase().includes(query));
  if (sortSelect.value === "price-asc") filteredProducts.sort((a, b) => a.price - b.price);
  if (sortSelect.value === "price-desc") filteredProducts.sort((a, b) => b.price - a.price);
  if (sortSelect.value === "rating") filteredProducts.sort((a, b) => Number(b.rating) - Number(a.rating));
  renderProducts();
}

function showNotice(message, isError = false) {
  notice.textContent = message;
  notice.className = isError ? "notice error" : "notice";
  notice.style.display = "block";
}

function openCheckout() {
  if (!getCartRows().length) {
    alert("Your cart is empty.");
    return;
  }
  const user = readCurrentUser();
  if (user?.email) {
    document.getElementById("customerEmail").value = user.email;
    document.getElementById("customerName").value = user.username || "";
  }
  notice.style.display = "none";
  checkoutModal.classList.add("open");
}

async function submitCheckout(event) {
  event.preventDefault();
  const rows = getCartRows();
  const form = new FormData(checkoutForm);
  const customer = {
    shipping_name: String(form.get("name") || "").trim(),
    email: String(form.get("email") || "").trim(),
    shipping_phone: String(form.get("phone") || "").trim(),
    shipping_address: String(form.get("address") || "").trim(),
    payment_method: String(form.get("payment") || "UPI"),
    payment_status: "paid",
    status: "placed"
  };

  if (!customer.shipping_name || !customer.email || !customer.shipping_phone || !customer.shipping_address) {
    showNotice("Please fill all checkout fields.", true);
    return;
  }

  try {
    const user = readCurrentUser();
    if (user?.email && customer.email === user.email) {
      for (const row of rows) {
        await apiRequest("/cart/items", {
          method: "POST",
          body: JSON.stringify({
            email: customer.email,
            product_id: row.id,
            product_name: row.name,
            product_image: row.image,
            product_description: row.desc,
            price: row.price,
            quantity: row.quantity
          })
        });
      }
      await apiRequest("/orders", {
        method: "POST",
        body: JSON.stringify(customer)
      });
    }
    cart = {};
    saveLocalCart();
    renderCart();
    showNotice("Order placed successfully. Receipt has been generated in the demo flow.");
    checkoutForm.reset();
  } catch (error) {
    showNotice(error.message || "Order saved locally, but backend order sync failed.", true);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  setTheme();
  renderProducts();
  renderCart();

  searchInput.addEventListener("input", applyFilters);
  sortSelect.addEventListener("change", applyFilters);
  document.getElementById("cartButton").addEventListener("click", () => cartDrawer.classList.add("open"));
  document.getElementById("closeCart").addEventListener("click", () => cartDrawer.classList.remove("open"));
  document.getElementById("checkoutButton").addEventListener("click", openCheckout);
  document.getElementById("closeCheckout").addEventListener("click", () => checkoutModal.classList.remove("open"));
  document.getElementById("browseButton").addEventListener("click", () => document.getElementById("catalog").scrollIntoView({ behavior: "smooth" }));
  checkoutForm.addEventListener("submit", submitCheckout);
  checkoutModal.addEventListener("click", (event) => {
    if (event.target === checkoutModal) checkoutModal.classList.remove("open");
  });
});

  </script>

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /api {
        proxy_pass http://backend:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /fashion { try_files /fashion/index.html =404; }
    location = /mobiles { try_files /mobiles/index.html =404; }
    location = /beauty { try_files /beauty/index.html =404; }
    location = /electronics { try_files /electronics/index.html =404; }
    location = /home { try_files /home/index.html =404; }
    location = /appliances { try_files /appliances/index.html =404; }
    location = /toys { try_files /toys/index.html =404; }
    location = /food { try_files /food/index.html =404; }
    location = /auto { try_files /auto/index.html =404; }
    location = /two-wheelers { try_files /two-wheelers/index.html =404; }
    location = /sports { try_files /sports/index.html =404; }
    location = /books { try_files /books/index.html =404; }
    location = /furniture { try_files /furniture/index.html =404; }
    location = /googlepay { try_files /googlepay/index.html =404; }
    location = /computers { try_files /computers/index.html =404; }
    location = /earphones { try_files /earphones/index.html =404; }
    location = /googlegrocery { try_files /googlegrocery/index.html =404; }
    location = /googlemusic { try_files /googlemusic/index.html =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
